# nginx auth_request example for Keycloak Personal Access Tokens
#
# How it works:
#   Every request to the protected upstream first hits /auth-check.
#   nginx sends the Authorization header (Basic user:token) to the PAT /auth endpoint.
#   On 200 the upstream receives the X-User, X-User-Id, and X-Roles headers.
#   On 401/403/429 nginx returns that status directly to the client.
#
# Cache recommendation:
#   Enable proxy_cache for /auth-check to avoid hashing on every request.
#   Default TTL: 30 s. A revoked token stays valid until the cache expires.

upstream keycloak {
    server keycloak:8080;
}

upstream my_service {
    server my-service:8080;
}

proxy_cache_path /tmp/nginx-pat-cache levels=1:2 keys_zone=pat_cache:1m max_size=10m inactive=1m;

server {
    listen 80;

    location /auth-check {
        internal;

        proxy_pass         http://keycloak/realms/myrealm/personal-access-token/auth;
        proxy_pass_request_body off;
        proxy_set_header   Content-Length "";
        proxy_set_header   X-Original-URI $request_uri;

        # Forward the client's Authorization header to Keycloak
        proxy_set_header   Authorization $http_authorization;

        # Optional: require a specific role for this location
        # proxy_set_header X-Required-Role "maven-deploy";

        # Cache successful auth results for 30 seconds
        proxy_cache            pat_cache;
        proxy_cache_valid      200 30s;
        proxy_cache_key        "$http_authorization$http_x_required_role";
        proxy_ignore_headers   Cache-Control;
    }

    location / {
        auth_request /auth-check;

        # Propagate identity headers from Keycloak to upstream
        auth_request_set $x_user     $upstream_http_x_user;
        auth_request_set $x_user_id  $upstream_http_x_user_id;
        auth_request_set $x_roles    $upstream_http_x_roles;

        proxy_set_header X-User    $x_user;
        proxy_set_header X-User-Id $x_user_id;
        proxy_set_header X-Roles   $x_roles;

        proxy_pass http://my_service;

        # Map Keycloak error codes to client-visible responses
        error_page 401 = @unauthorized;
        error_page 403 = @forbidden;
        error_page 429 = @rate_limited;
    }

    location @unauthorized {
        return 401 "Unauthorized\n";
    }

    location @forbidden {
        return 403 "Forbidden\n";
    }

    location @rate_limited {
        return 429 "Too Many Requests\n";
    }
}
